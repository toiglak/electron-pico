name: Build Electron Pico (macOS Only)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELECTRON_BRANCH: main
  GN_OUT_DIR: pico-release
  DEPOT_TOOLS_UPDATE: 0
  GIT_TERMINAL_PROMPT: 0
  GCM_INTERACTIVE: never

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          echo "::group::Disk before cleanup"
          df -h /
          echo "::endgroup::"
          
          # Scorched earth: Remove everything not needed for building Electron
          sudo rm -rf /Applications/Xcode_13* /Applications/Xcode_14* /Applications/Xcode_15.[0-5]* 2>/dev/null || true
          sudo rm -rf /Library/Developer/CoreSimulator /Users/runner/Library/Developer/CoreSimulator 2>/dev/null || true
          sudo rm -rf /usr/local/share/dotnet /opt/ghc /usr/local/lib/node_modules 2>/dev/null || true
          sudo rm -rf /Users/runner/Library/Android 2>/dev/null || true
          sudo rm -rf /usr/local/Homebrew /usr/local/Cellar 2>/dev/null || true
          
          # Remove other pre-installed runtimes
          sudo rm -rf /usr/local/share/powershell /usr/share/swift /usr/local/share/boost 2>/dev/null || true
          
          echo "::group::Disk after cleanup"
          df -h /
          echo "::endgroup::"

      - name: Checkout electron-pico
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build-tools
        run: npm install -g @electron/build-tools

      - name: Initialize build config
        run: |
          # Initialize with release profile first to establish the workspace structure
          e init pico-release \
            -i release \
            --root ${{ github.workspace }}/electron \
            --remote-build none \
            --use-https \
            -f

          # OPTIMIZATION: Restrict sync to macOS only. 
          # This saves ~10GB and prevents gclient from stalling on Android/Windows deps.
          sed -i '' "s/target_os = \[\]/target_os = ['mac']/g" ${{ github.workspace }}/electron/.gclient
          
      - name: Sync source code
        run: |
          echo "::group::Disk state before sync"
          df -h /
          echo "::endgroup::"

          # Using --verbose to trace stalls, and --force/--no-history for space optimization
          e sync --force --no-history --shallow --verbose
          
          echo "::group::Nuclear Cleanup of Test Data"
          # These folders contain GBs of images/videos/tests we don't need for release
          rm -rf ${{ github.workspace }}/electron/src/third_party/blink/web_tests
          rm -rf ${{ github.workspace }}/electron/src/content/test/data
          rm -rf ${{ github.workspace }}/electron/src/media/test/data
          rm -rf ${{ github.workspace }}/electron/src/chrome/test/data
          rm -rf ${{ github.workspace }}/electron/src/v8/test
          echo "Cleanup complete."
          echo "::endgroup::"
          
          df -h /

      - name: Install pico.gn
        run: cp pico.gn ${{ github.workspace }}/electron/src/electron/build/args/pico.gn

      - name: Reconfigure for pico build
        run: |
          # Now switch the config to 'pico' using the local pico.gn just installed
          e init pico-release \
            -i pico \
            --root ${{ github.workspace }}/electron \
            --remote-build none \
            --use-https \
            -f

      - name: Generate build files
        run: e build --only-gen

      - name: Build Electron
        run: e build

      - name: Purge build objects before zipping
        run: |
          echo "Building finished. Purging obj/ folder to free up ~30GB for the zip operation."
          OUT_DIR="${{ github.workspace }}/electron/src/out/${{ env.GN_OUT_DIR }}"
          # We ONLY need the linked .app and the dist files. We DON'T need the .o files anymore.
          rm -rf "${OUT_DIR}/obj"
          rm -rf "${OUT_DIR}/gen"
          df -h /

      - name: Build dist zip
        run: e build --target //electron:electron_dist_zip

      - name: Prepare Patterned Artifact for electron-builder
        run: |
          mkdir -p dist-target
          OUT_DIR="${{ github.workspace }}/electron/src/out/${{ env.GN_OUT_DIR }}"
          
          # Extract version from Electron source
          VERSION=$(node -p "require('${{ github.workspace }}/electron/src/electron/package.json').version")
          echo "ELECTRON_VERSION=$VERSION" >> $GITHUB_ENV
          
          # Target pattern: electron-v${version}-${platformName}-${arch}.zip
          cp "${OUT_DIR}/dist.zip" "dist-target/electron-v${VERSION}-darwin-arm64.zip"
          
          # Version and Size reports
          echo "v${VERSION}" > "dist-target/version"
          du -sh "${OUT_DIR}/Electron.app" > "dist-target/size-report.txt"
          du -sh "dist-target/electron-v${VERSION}-darwin-arm64.zip" >> "dist-target/size-report.txt"

      - name: Upload patterned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-pico-dist-v${{ env.ELECTRON_VERSION }}
          path: dist-target/
          retention-days: 30
          if-no-files-found: error
