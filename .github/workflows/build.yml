name: Build Electron Pico (macOS Only)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELECTRON_BRANCH: 41-x-y
  GN_OUT_DIR: pico-release
  DEPOT_TOOLS_UPDATE: 1
  GIT_TERMINAL_PROMPT: 0
  GCM_INTERACTIVE: never

jobs:
  build-macos:
    runs-on: macos-26-intel # 2026-era Intel runner with larger RAM capacity
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          echo "::group::Disk before cleanup"
          df -h /
          echo "::endgroup::"

          # 1. Surgical Xcode cleanup: Keep the currently selected Xcode, delete the rest.
          # GitHub macos-14 runners usually have one or two versions.
          CURRENT_XCODE=$(xcode-select -p)
          echo "Current Xcode: $CURRENT_XCODE"

          # Delete known old versions that are NOT the current one
          for version in 13 14 15.0 15.1 15.2 15.3; do
            XCODE_PATH="/Applications/Xcode_${version}.app"
            if [ -d "$XCODE_PATH" ] && [[ "$CURRENT_XCODE" != "$XCODE_PATH"* ]]; then
              echo "Removing $XCODE_PATH"
              sudo rm -rf "$XCODE_PATH"
            fi
          done

          # 2. Purge other large unused runtimes and SDKs
          sudo rm -rf /Library/Developer/CoreSimulator /Users/runner/Library/Developer/CoreSimulator 2>/dev/null || true
          sudo rm -rf /usr/local/share/dotnet /opt/ghc /usr/local/lib/node_modules 2>/dev/null || true
          sudo rm -rf /Users/runner/Library/Android 2>/dev/null || true


          # Remove other pre-installed runtimes
          sudo rm -rf /usr/local/share/powershell /usr/share/swift /usr/local/share/boost 2>/dev/null || true
          sudo rm -rf /Library/Frameworks/Mono.framework /Library/Frameworks/Xamarin.Mac.framework 2>/dev/null || true

          # 3. Ensure Rosetta 2 is installed (recommended by Electron docs for Arm64)
          sudo softwareupdate --install-rosetta --agree-to-license || true

          echo "::group::Disk after cleanup"
          df -h /
          echo "::endgroup::"

      - name: Checkout electron-pico
        uses: actions/checkout@v4

      - name: Install build-tools
        run: npm install -g @electron/build-tools


      - name: Restore source cache from Azure
        id: restore-cache
        continue-on-error: true
        env:
          AZ_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZ_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          AZ_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
        run: |
          if [ -z "$AZ_ACCOUNT" ]; then
            echo "Azure secrets not found, skipping cache restore."
            exit 0
          fi

          AZ_ARGS="--account-name $AZ_ACCOUNT --account-key $AZ_KEY --container-name $AZ_CONTAINER"
          
          echo "Checking for existing source snapshot in Azure..."
          if az storage blob exists $AZ_ARGS --name electron-src.tar.zst --output tsv | grep -q True; then
            echo "::group::Downloading and extracting source cache (Streaming)"
            az storage blob download $AZ_ARGS --name electron-src.tar.zst --file - | zstd -d -T0 | tar -xf -
            echo "::endgroup::"
          else
            echo "No existing cache found in Azure."
          fi

      - name: Initialize build config
        run: |
          # 1. Create the target directory structure for the custom args file
          mkdir -p ${{ github.workspace }}/electron/src/electron/build/args

          # 2. Install our custom pico.gn args file
          cp pico.gn ${{ github.workspace }}/electron/src/electron/build/args/pico.gn

          echo "::group::Initializing with 'pico' profile"
          # 3. Initialize with 'pico' profile immediately.
          # This establishes the workspace structure and points the config to our custom args.
          e init pico-release \
            -i pico \
            -o ${{ env.GN_OUT_DIR }} \
            --root ${{ github.workspace }}/electron \
            --target-cpu arm64 \
            --remote-build none \
            --use-https \
            -f
          echo "::endgroup::"

          # Increase Git tolerance for large transfers 
          git config --global http.postBuffer 1048576000
          git config --global core.deltaBaseCacheLimit 2G
          git config --global gc.auto 0

          echo "::group::Syncing source code (Resilient)"
          # Resilient sync: using 'e sync' to handle .gclient correctly while specifying the branch
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Sync attempt $i of $MAX_RETRIES..."
            if e sync -j 4 --revision src/electron@${{ env.ELECTRON_BRANCH }} --delete_unversioned_trees; then
              echo "Sync completed successfully."
              break
            else
              if [ $i -eq $MAX_RETRIES ]; then
                echo "Sync failed after $MAX_RETRIES attempts."
                exit 1
              fi
              echo "Sync failed. Waiting 60s before retry..."
              sleep 60
            fi
          done
          echo "::endgroup::"

          echo "::group::Disk state after sync"
          df -h /
          echo "::endgroup::"

      - name: Save source cache hash
        id: cache-hash
        run: |
          # Detect if sources exist and hash them
          if [ -f "electron/src/electron/DEPS" ]; then
            HASH=$(shasum electron/src/electron/DEPS electron/src/DEPS | shasum | awk '{print $1}')
            echo "current_hash=$HASH" >> $GITHUB_OUTPUT
          fi

      - name: Update source cache in Azure (Checkpoint)
        id: save-cache
        continue-on-error: true
        if: github.ref == 'refs/heads/main' && steps.cache-hash.outputs.current_hash != ''
        env:
          AZ_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZ_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          AZ_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
          CURRENT_HASH: ${{ steps.cache-hash.outputs.current_hash }}
        run: |
          if [ -z "$AZ_ACCOUNT" ]; then
            echo "Missing secrets, skipping cache update."
            exit 0
          fi

          AZ_ARGS="--account-name $AZ_ACCOUNT --account-key $AZ_KEY --container-name $AZ_CONTAINER"
          
          # Check cached hash
          CACHED_HASH=$(az storage blob download $AZ_ARGS --name electron-src.hash --file - 2>/dev/null || echo "none")
          
          if [ "$CURRENT_HASH" != "$CACHED_HASH" ]; then
            echo "Source checkpoint triggered ($CACHED_HASH -> $CURRENT_HASH). Uploading..."
            # Stream tar to zstd, then save to a temp file because 'az' upload from stdin is unreliable on some versions
            tar -cf - --exclude='electron/src/out' electron | zstd -T0 > electron-src.tar.zst
            az storage blob upload $AZ_ARGS --name electron-src.tar.zst --file electron-src.tar.zst --overwrite
            
            # Clean up to save space immediately
            rm electron-src.tar.zst

            echo "$CURRENT_HASH" | az storage blob upload $AZ_ARGS --name electron-src.hash --file - --overwrite
            echo "Source checkpoint saved successfully."
          else
            echo "Snapshot matches Azure cache. No upload needed."
          fi

      - name: Install sccache
        run: |
          SCCACHE_VERSION=v0.8.2
          curl -L "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-apple-darwin.tar.gz" | tar xz
          sudo mv sccache-${SCCACHE_VERSION}-x86_64-apple-darwin/sccache /usr/local/bin/sccache
          chmod +x /usr/local/bin/sccache
          sccache --version

      - name: Generate build files
        env:
          SCCACHE_AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          SCCACHE_AZURE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          SCCACHE_AZURE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
        run: e build --only-gen

      - name: Build Electron
        env:
          SCCACHE_AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          SCCACHE_AZURE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          SCCACHE_AZURE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
        run: |
          sccache --start-server
          e build
          sccache --show-stats


      - name: Build dist zip
        run: e build --target //electron:electron_dist_zip

      - name: Purge build objects to free space
        run: |
          echo "Zipping finished. Purging obj/ folder to free up ~30GB for the next steps."
          OUT_DIR="${{ github.workspace }}/electron/src/out/${{ env.GN_OUT_DIR }}"
          rm -rf "${OUT_DIR}/obj"
          # Keep 'gen' just in case it's needed for the upload path or version checking
          df -h /

      - name: Prepare Patterned Artifact for electron-builder
        run: |
          mkdir -p dist-target
          OUT_DIR="${{ github.workspace }}/electron/src/out/${{ env.GN_OUT_DIR }}"

          # Extract version from Electron source
          VERSION=$(node -p "require('${{ github.workspace }}/electron/src/electron/package.json').version")
          echo "ELECTRON_VERSION=$VERSION" >> $GITHUB_ENV

          # Target pattern: electron-v${version}-${platformName}-${arch}.zip
          cp "${OUT_DIR}/dist.zip" "dist-target/electron-v${VERSION}-darwin-arm64.zip"

          # Version and Size reports
          echo "v${VERSION}" > "dist-target/version"
          du -sh "${OUT_DIR}/Electron.app" > "dist-target/size-report.txt"
          du -sh "dist-target/electron-v${VERSION}-darwin-arm64.zip" >> "dist-target/size-report.txt"

      - name: Upload patterned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-pico-dist-v${{ env.ELECTRON_VERSION }}
          path: dist-target/
          retention-days: 30
          if-no-files-found: error
